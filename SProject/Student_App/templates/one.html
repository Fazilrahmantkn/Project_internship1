<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Template</title>
</head>
<body>
    <h2>{{p1}}</h2>
    <p>List: {{ k1 }}</p>
    <h6>{{l1}}</h6>

    <h3>Loop with Conditions:</h3>

    {% for i in k1 %}
        {% if i > 40 %}
            <p>{{ i }} is greater than 40</p>
        {% elif i > 20 %}
            <p>{{ i }} is greater than 20</p>
        {% else %}
            <p>{{ i }} is 20 or less</p>
        {% endif %}
    {% endfor %}

    
</body>
</html>

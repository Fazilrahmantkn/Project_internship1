<!DOCTYPE html>
<html>
<head>
    <title>Add Company</title>
</head>
<body>

<h1>Add Company</h1>

<form method="POST">
    {% csrf_token %}

    Name:

    Location:
    <input type="text" name="location"><br><br>

    Employees:

    <button type="submit">Save</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
</head>
<body>

<h1>Employee Details</h1>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Salary</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp.name }}</td>
        <td>{{ emp.age }}</td>
        <td>{{ emp.salary }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>

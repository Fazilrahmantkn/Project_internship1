<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
</head>
<body>

<h1>Doctors</h1>

<a href="{% url 'add_doctor' %}">
    Add Doctor
</a>

<table border="1">
<tr>
    <th>Name</th>
    <th>Specialization</th>
    <th>Experience</th>
</tr>

{% for doctor in doctors %}
<tr>
    <td>{{ doctor.name }}</td>
    <td>{{ doctor.specialization }}</td>
    <td>{{ doctor.experience }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>

{% extends 'base.html' %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
</head>
<body>

<h2>Delete Student</h2>

<p>Are you sure you want to delete this student?</p>

<p>
    Name: {{ object.name }}<br>
    Age: {{ object.age }}<br>
    Email: {{ object.email }}
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
</form>

<br>

<a href="{% url 'student_list' %}">
    Cancel
</a>

</body>
</html>

{% endblock %}

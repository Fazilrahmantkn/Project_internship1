<!DOCTYPE html>
<html>
<head>
    <title>Delete Teacher</title>
</head>
<body>

<h2>Delete Teacher</h2>

<p>Are you sure you want to delete this teacher?</p>

<p>
    Name: {{ object.name }}<br>
    Subject: {{ object.subject }}<br>
    Email: {{ object.email }}
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
</form>

<br>

<a href="{% url 'teacher_list' %}">
    Cancel
</a>

</body>
</html>

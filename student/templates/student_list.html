<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Students</h2>

<a href="{% url 'student_add' %}">
    Add Student
</a>

<br><br>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Email</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.age }}</td>
        <td>{{ student.email }}</td>

        <td>
            <a href="{% url 'student_update' student.pk %}">
                Edit
            </a>
        </td>

        <td>
            <a href="{% url 'student_delete' student.pk %}">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
